[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "leaguebrief-espn-normalizer"
version = "0.1.0"
description = "LeagueBrief ESPN raw snapshot normalizer"
requires-python = ">=3.13"

[tool.setuptools.packages.find]
include = ["leaguebrief_espn_normalizer*"]
