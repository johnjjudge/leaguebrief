[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "leaguebrief-espn-adapter"
version = "0.1.0"
description = "LeagueBrief ESPN fantasy football raw data adapter"
requires-python = ">=3.13"

[tool.setuptools.packages.find]
include = ["leaguebrief_espn_adapter*"]
