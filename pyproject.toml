[tool.ruff]
line-length = 100
target-version = "py313"
extend-exclude = [
    "apps/web/dist",
    "apps/web/node_modules",
    "infra/.artifacts",
]

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F", "I"]

[tool.pytest.ini_options]
markers = [
    "sql_integration: opt-in tests that create and drop a live disposable SQL database",
]
